<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
</head>
<body bgcolor="lightgray">

    <h1>Registro en nuestra tienda</h1>

    <form>

        Nombre de usuario<br>
        <input type="text" placeholder="Ej: luis">
        <br><br>

        Email:<br>
        <input type="email" placeholder="Ej: luis@gmail.com">
        <br><br>

        Edad:<br>
        <input type="number" placeholder="Ej: 21">
        <br><br>

        Género:<br>
        <input type="radio" name="genero"> Masculino<br>
        <input type="radio" name="genero"> Femenino
        <br><br>

        Recomendado por:<br>
        <select>
            <option>Google</option>
            <option>Facebook</option>
            <option>Instagram</option>
        </select>
        <br><br>

        Comentarios:<br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>

        Acepto términos y condiciones:
        <input type="checkbox">
        <br><br>

        <input type="submit" value="Registrar">

    </form>

</body>
</html>
